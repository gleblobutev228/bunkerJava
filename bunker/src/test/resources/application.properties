spring.application.name=bunker
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.repositories.enabled=false
app.ws.redis.enabled=false
jwt.secret=bunker-jwt-secret-key-for-local-development-change-me-please
spring.datasource.url=jdbc:h2:mem:bunker-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
